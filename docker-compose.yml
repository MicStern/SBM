services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/appdb
    ports:
      - "8001:8000"
    extra_hosts:
      - "theta-v2-server.5micron.net:104.21.39.45"

jupyter:
  build:
    context: ./notebook
  depends_on:
    db:
      condition: service_healthy
  ports:
    - "8000:8888"
  user: "${UID}:${GID}"
  volumes:
    - ./notebook:/home/jovyan/work
  environment:
    POSTGRES_HOST: db
    POSTGRES_PORT: 5432
    POSTGRES_DB: appdb
    POSTGRES_USER: app
    POSTGRES_PASSWORD: app
  command: >
    start-notebook.py
    --IdentityProvider.token=mein-notebook-token
    --ServerApp.allow_remote_access=True

volumes:
  dbdata:
